<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bright Colorful Games</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="hero">
            <h1>Welcome to Bright Colorful Games!</h1>
            <p>Your journey into vibrant fun starts here.</p>
        </div>
    </header>
    <main>
        <section class="games">
            <div class="game-card">
                <h2>Game 1</h2>
                <p>Description of Game 1.</p>
            </div>
            <div class="game-card">
                <h2>Game 2</h2>
                <p>Description of Game 2.</p>
            </div>
            <div class="game-card">
                <h2>Game 3</h2>
                <p>Description of Game 3.</p>
            </div>
        </section>
        <section id="contact">
            <h2>Contact Us</h2>
            <form>
                <label for="name">Name:</label><br>
                <input type="text" id="name" name="name"><br>
                <label for="email">Email:</label><br>
                <input type="email" id="email" name="email"><br>
                <input type="submit" value="Submit">
            </form>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
